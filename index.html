<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RxIntervene | Clinical Pharmacy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .safe-bottom { padding-bottom: calc(2.5rem + env(safe-area-inset-bottom)); }
        input, select, textarea { font-size: 16px !important; } 
        .theme-transition { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden text-slate-900">

    <section id="view-auth" class="fixed inset-0 bg-white z-[100] flex flex-col p-8 space-y-6">
        <div class="mt-12 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center shadow-xl shadow-blue-100 mb-4 theme-transition">
                <span class="text-white text-4xl">💊</span>
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">RxIntervene</h1>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Clinical Workspace</p>
        </div>

        <div id="auth-box" class="space-y-4 pt-8">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Email Address</label>
                <input type="email" id="authEmail" placeholder="hospital@domain.com" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-medium text-sm border border-transparent focus:border-blue-500 transition-all">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Password</label>
                <input type="password" id="authPassword" placeholder="••••••••" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-medium text-sm border border-transparent focus:border-blue-500 transition-all">
            </div>
            
            <div class="pt-4 space-y-3">
                <button onclick="window.handleAuth('login')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-100 active:scale-95 transition-all theme-transition">
                    Sign In
                </button>
                <button onclick="window.handleAuth('signup')" class="w-full py-4 border-2 border-slate-100 text-slate-400 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">
                    Create Account
                </button>
            </div>

            <button onclick="window.handleResetPassword()" class="w-full text-[10px] font-bold text-slate-400 uppercase tracking-tighter text-center mt-4">
                Forgot Password?
            </button>
        </div>
    </section>

    <header class="bg-white px-6 py-4 shadow-sm border-b z-10 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-100 theme-transition">
                <span class="text-white text-xl">💊</span>
            </div>
            <div>
                <h1 class="text-lg font-extrabold tracking-tight text-slate-800 leading-none">RxIntervene</h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Clinical Pharmacy Pro</p>
            </div>
        </div>
        <button onclick="showView('setup')" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-sm border border-slate-200 active:scale-90 transition-transform">
            👤
        </button>
    </header>

    <main class="flex-1 overflow-y-auto pb-32 hide-scrollbar">
        
        <section id="view-home" class="p-4 space-y-3">
            <div class="flex justify-between items-center px-1 mb-2">
                <h2 class="font-extrabold text-xl text-slate-800">Activity</h2>
                <button class="text-[10px] font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-xl uppercase tracking-wider theme-transition">Recent ▾</button>
            </div>
            <div id="intervention-list" class="space-y-4"></div>
        </section>

        <section id="view-followup" class="hidden p-4 space-y-4 pb-32">
            <div class="flex justify-between items-center px-1">
                <h2 class="font-extrabold text-xl text-slate-800">Follow-ups</h2>
                <span class="text-[10px] font-black bg-red-100 text-red-600 px-2 py-1 rounded-lg uppercase">Active Tasks</span>
            </div>
            <div id="followup-list-today" class="space-y-4"></div>
        </section>

        <section id="view-analytics" class="hidden p-4 space-y-4 pb-32">
            <div class="flex justify-between items-center px-1">
                <h2 class="font-extrabold text-xl text-slate-800">Analytics</h2>
                <select id="monthFilter" onchange="window.updateAllCharts()" class="bg-blue-600 text-white text-[10px] font-black px-3 py-2 rounded-xl outline-none border-none uppercase theme-transition">
                    <option value="all">All Time</option>
                    <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
                    <option value="3" selected>Apr</option><option value="4">May</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Logs</p>
                    <p id="stat-total" class="text-2xl font-black text-slate-800">0</p>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 text-green-600">Acceptance</p>
                    <p id="stat-rate" class="text-2xl font-black text-green-600">0%</p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3 text-center">Weekly Trend</p>
                <div class="h-32"><canvas id="trendChart"></canvas></div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3 w-full text-center">Wards</p>
                    <div class="h-24 w-full"><canvas id="wardChart"></canvas></div>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3 w-full text-center">Outcomes</p>
                    <div class="h-24 w-full"><canvas id="responseChart"></canvas></div>
                </div>
            </div>
        </section>

        <section id="view-setup" class="hidden p-4 space-y-6 pb-32">
            <div class="px-1">
                <h2 class="font-extrabold text-xl text-slate-800">Setup</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Profile & System</p>
            </div>

            <div class="bg-white p-5 rounded-[2.5rem] border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="w-14 h-14 rounded-2xl bg-blue-100 flex items-center justify-center text-blue-600 text-xl font-black theme-transition">SA</div>
                <div>
                    <h3 class="font-bold text-slate-800" id="display-user-name">Clinical Pharmacist</h3>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter" id="display-user-email">Syncing...</p>
                </div>
            </div>

            <div class="bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm">
                <h3 class="font-black text-[10px] uppercase tracking-widest text-slate-400 mb-4 text-center">App Theme</h3>
                <div class="flex justify-around">
                    <button onclick="window.changeTheme('blue')" class="w-10 h-10 rounded-full bg-blue-600 border-4 border-white shadow-md"></button>
                    <button onclick="window.changeTheme('emerald')" class="w-10 h-10 rounded-full bg-emerald-600 border-4 border-white shadow-md"></button>
                    <button onclick="window.changeTheme('indigo')" class="w-10 h-10 rounded-full bg-indigo-600 border-4 border-white shadow-md"></button>
                    <button onclick="window.changeTheme('slate')" class="w-10 h-10 rounded-full bg-slate-800 border-4 border-white shadow-md"></button>
                </div>
            </div>

            <div class="bg-slate-900 rounded-[2.5rem] p-6 text-white shadow-2xl shadow-slate-200">
                <button onclick="window.exportToPDF()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all theme-transition shadow-lg">
                    Export All Data to PDF
                </button>
                <button onclick="window.handleLogout()" class="w-full mt-6 text-red-400 font-bold text-[10px] uppercase tracking-widest">
                    Sign Out of Account
                </button>
            </div>
        </section>

        <section id="view-form" class="hidden fixed inset-0 bg-white z-50 overflow-y-auto">
            <div class="sticky top-0 bg-white px-6 py-4 border-b flex justify-between items-center z-10">
                <button onclick="showView('home')" class="text-slate-400 font-bold">Cancel</button>
                <h2 class="font-extrabold text-lg tracking-tight text-blue-600 theme-transition">New Entry</h2>
                <button form="interventionForm" type="submit" id="submitBtn" class="text-blue-600 font-black theme-transition">Save</button>
            </div>
            <form id="interventionForm" class="p-6 space-y-8 pb-32">
                <div class="space-y-6">
                    <div class="border-b-2 border-slate-100 pb-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Patient ID</label>
                        <input type="text" id="patientId" placeholder="e.g. P102" class="w-full py-2 text-2xl outline-none font-bold" required>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="border-b-2 border-slate-100">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Ward</label>
                            <select id="ward" class="w-full py-3 bg-transparent font-bold outline-none text-sm">
                                <option>Emergency</option><option>Medical</option><option>Surgical</option>
                                <option>Pediatric</option><option>NICU</option><option>OPD</option>
                            </select>
                        </div>
                        <div class="border-b-2 border-slate-100">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Urgency</label>
                            <select id="urgency" class="w-full py-3 bg-transparent font-bold outline-none text-sm">
                                <option>Normal</option><option>High</option><option>Stat</option>
                            </select>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="bg-slate-100 p-4 rounded-2xl shadow-inner shadow-slate-200/50">
                            <label class="text-[10px] font-black text-slate-400 uppercase block mb-1">The Issue</label>
                            <input type="text" id="issue" placeholder="What is the problem?" class="w-full bg-transparent outline-none font-medium text-sm">
                        </div>
                        <div class="bg-slate-100 p-4 rounded-2xl shadow-inner shadow-slate-200/50">
                            <label class="text-[10px] font-black text-slate-400 uppercase block mb-1">Your Intervention</label>
                            <input type="text" id="intervention" placeholder="What do you suggest?" class="w-full bg-transparent outline-none font-medium text-sm">
                        </div>
                    </div>
                </div>
                <div class="bg-blue-600 rounded-[2.5rem] p-6 text-white shadow-2xl shadow-blue-200 space-y-5 theme-transition">
                    <h3 class="font-black text-sm uppercase tracking-widest flex items-center gap-2">🗣️ Response</h3>
                    <select id="responseStatus" onchange="window.toggleModField()" class="w-full p-4 rounded-2xl bg-white/20 border border-white/30 text-white font-bold outline-none">
                        <option class="text-slate-900" value="Pending">Pending</option>
                        <option class="text-slate-900" value="Accepted">Accepted</option>
                        <option class="text-slate-900" value="Modified">Modified</option>
                        <option class="text-slate-900" value="Rejected">Rejected</option>
                    </select>
                    <div id="modField" class="hidden">
                        <label class="text-[10px] font-bold text-blue-200 uppercase mb-1 block">Modification Notes</label>
                        <textarea id="modificationNote" placeholder="Doctor's changes..." class="w-full p-4 rounded-2xl bg-white/10 border border-white/30 text-white text-sm outline-none h-20"></textarea>
                    </div>
                    <input type="text" id="notes" placeholder="General Notes" class="w-full p-4 rounded-2xl bg-white/20 border border-white/30 text-white text-sm outline-none placeholder:text-white/50">
                </div>
                <div class="flex items-center justify-between p-5 bg-slate-100 rounded-[2rem] border border-slate-200">
                    <span class="font-bold text-slate-700 text-sm">Schedule Follow-up</span>
                    <input type="checkbox" id="followUp" class="w-6 h-6 rounded-full border-slate-300 text-blue-600 theme-transition">
                </div>
            </form>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-white/80 backdrop-blur-lg border-t border-slate-200 flex justify-around items-center pt-3 pb-8 px-4 z-40 safe-bottom">
        <button onclick="showView('home')" id="nav-home" class="flex flex-col items-center gap-1 w-1/5 text-blue-600 theme-transition">
            <span class="text-2xl">🏠</span><span class="text-[9px] font-black uppercase">Home</span>
        </button>
        <button onclick="showView('analytics')" id="nav-analytics" class="flex flex-col items-center gap-1 w-1/5 text-slate-300 theme-transition">
            <span class="text-2xl">📊</span><span class="text-[9px] font-black uppercase">Data</span>
        </button>
        <button onclick="showView('form')" class="flex flex-col items-center -mt-10 bg-blue-600 w-14 h-14 rounded-2xl shadow-xl shadow-blue-200 justify-center text-white text-3xl theme-transition active:scale-90">＋</button>
        <button onclick="showView('followup')" id="nav-followup" class="flex flex-col items-center gap-1 w-1/5 text-slate-300 theme-transition">
            <span class="text-2xl">🔔</span><span class="text-[9px] font-black uppercase">Review</span>
        </button>
        <button onclick="showView('setup')" id="nav-setup" class="flex flex-col items-center gap-1 w-1/5 text-slate-300 theme-transition">
            <span class="text-2xl">⚙️</span><span class="text-[9px] font-black uppercase">Set</span>
        </button>
    </nav>

    <script type="module" src="index.js"></script>
</body>
</html>
